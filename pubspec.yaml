name: sms_gateway
description: "SMS Gateway Pro - Send SMS via HTTP API using your Android phone."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Background service
  flutter_background_service: ^5.0.10

  # Local notifications (required by background service)
  flutter_local_notifications: ^18.0.1

  # HTTP server
  shelf: ^1.4.2
  shelf_router: ^1.1.4

  # SMS
  telephony: ^0.2.0

  # Network info (get local IP)
  network_info_plus: ^6.1.1

  # Permissions
  permission_handler: ^11.4.0

  # Wake lock
  wakelock_plus: ^1.2.10

  # Persistent storage
  shared_preferences: ^2.5.3

  # Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
